<!DOCTYPE html>
<html lang="en" id="htmlElement">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY FOOD DELIVERY</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================
           ROOT VARIABLES - THEMES
           ============================================ */
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: rgba(255,255,255,0.05);
            --text-primary: #ffffff;
            --text-secondary: #aaaacc;
            --text-muted: #666688;
            --border-color: rgba(255,255,255,0.08);
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --gradient-1: #ff6b35;
            --gradient-2: #f7931e;
            --gradient-3: #ff006e;
            --accent: #ff6b35;
            --accent-glow: rgba(255,107,53,0.3);
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --nav-bg: rgba(10,10,26,0.95);
            --card-hover: rgba(255,107,53,0.05);
        }
        
        /* Theme: Food Orange */
        [data-theme="orange"] {
            --gradient-1: #ff6b35;
            --gradient-2: #f7931e;
            --gradient-3: #ff006e;
            --accent: #ff6b35;
            --accent-glow: rgba(255,107,53,0.3);
        }
        
        /* Theme: Green Fresh */
        [data-theme="green"] {
            --gradient-1: #00b894;
            --gradient-2: #00cec9;
            --gradient-3: #0984e3;
            --accent: #00b894;
            --accent-glow: rgba(0,184,148,0.3);
        }
        
        /* Theme: Purple Premium */
        [data-theme="purple"] {
            --gradient-1: #6c5ce7;
            --gradient-2: #a29bfe;
            --gradient-3: #fd79a8;
            --accent: #6c5ce7;
            --accent-glow: rgba(108,92,231,0.3);
        }
        
        /* Theme: Red Hot */
        [data-theme="red"] {
            --gradient-1: #e17055;
            --gradient-2: #d63031;
            --gradient-3: #fd79a8;
            --accent: #e17055;
            --accent-glow: rgba(225,112,85,0.3);
        }
        
        /* Theme: Blue Ocean */
        [data-theme="blue"] {
            --gradient-1: #0984e3;
            --gradient-2: #74b9ff;
            --gradient-3: #00cec9;
            --accent: #0984e3;
            --accent-glow: rgba(9,132,227,0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        /* ============================================
           LOGIN SCREEN
           ============================================ */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(20px);
        }
        
        /* Food Background for Login */
        .login-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .login-bg .food-items {
            position: absolute;
            font-size: 60px;
            animation: floatFood 20s infinite linear;
            opacity: 0.08;
        }
        
        @keyframes floatFood {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.08; }
            90% { opacity: 0.08; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.5); opacity: 0; }
        }
        
        .login-bg .food-bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 400px;
            opacity: 0.03;
        }
        
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 45px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
        }
        
        /* Eating Character at Top */
        .eating-character {
            text-align: center;
            margin-bottom: 20px;
            animation: eatAnim 2s ease-in-out infinite;
        }
        
        @keyframes eatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-3deg); }
            75% { transform: translateY(-5px) rotate(3deg); }
        }
        
        .eating-character .char {
            font-size: 80px;
            display: block;
            animation: chew 0.6s ease-in-out infinite;
        }
        
        @keyframes chew {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        
        .eating-character .food-emoji {
            position: relative;
            display: inline-block;
            animation: foodBounce 1.5s ease-in-out infinite;
        }
        
        @keyframes foodBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }
        
        .login-container .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .login-container .logo h1 {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        .login-container .logo p {
            color: var(--text-secondary);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 3px;
        }
        
        .login-container .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid var(--border-color);
        }
        
        .login-container .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .login-container .tab-btn.active {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .login-container .tab-btn:hover:not(.active) {
            color: var(--text-primary);
        }
        
        .login-container .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .login-container .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-container .form-group {
            margin-bottom: 18px;
        }
        
        .login-container .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .login-container .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .login-container .form-group input:focus {
            border-color: var(--gradient-1);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .login-container .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .login-container .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-container .btn-primary {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .login-container .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px var(--accent-glow);
        }
        
        .login-container .btn-google {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }
        
        .login-container .btn-google:hover {
            border-color: var(--gradient-1);
            transform: translateY(-2px);
        }
        
        .login-container .btn-google svg {
            width: 20px;
            height: 20px;
        }
        
        .login-container .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .login-container .divider::before,
        .login-container .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .login-container .divider-text {
            color: var(--text-muted);
            font-size: 11px;
            padding: 0 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .login-container .message {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .login-container .message.active {
            display: block;
        }
        
        .login-container .message.error {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.2);
            color: #ff6b6b;
        }
        
        .login-container .message.success {
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.2);
            color: #51cf66;
        }
        
        .login-container .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .login-container .loading.active {
            display: block;
        }
        
        .login-container .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--gradient-1);
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================
           MAIN APP
           ============================================ */
        #appContent {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }
        
        #appContent.visible {
            display: block;
        }
        
        /* ============================================
           NAVBAR
           ============================================ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .navbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar .brand .logo-text {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .navbar .brand .logo-text i {
            margin-right: 8px;
        }
        
        .navbar .right-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .navbar .right-section .theme-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .navbar .right-section .theme-btn:hover {
            border-color: var(--gradient-1);
        }
        
        .navbar .right-section .admin-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .navbar .right-section .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        
        .navbar .right-section .logout-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .navbar .right-section .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .navbar .right-section .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }
        
        /* ============================================
           FOOD CATEGORIES
           ============================================ */
        .categories {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }
        
        .categories::-webkit-scrollbar {
            height: 3px;
        }
        
        .categories::-webkit-scrollbar-thumb {
            background: var(--gradient-1);
            border-radius: 10px;
        }
        
        .categories button {
            padding: 8px 20px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .categories button:hover {
            border-color: var(--gradient-1);
            color: var(--text-primary);
        }
        
        .categories button.active {
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        /* ============================================
           FOOD GRID
           ============================================ */
        .food-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .food-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .food-card:hover {
            transform: translateY(-8px);
            border-color: var(--gradient-1);
            box-shadow: 0 10px 40px rgba(255,107,53,0.15);
        }
        
        .food-card .image {
            width: 100%;
            height: 180px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: var(--text-muted);
            position: relative;
            overflow: hidden;
        }
        
        .food-card .image .price-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.7);
            color: var(--gradient-1);
            font-size: 14px;
            font-weight: 700;
        }
        
        .food-card .info {
            padding: 16px;
        }
        
        .food-card .info h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .food-card .info p {
            font-size: 13px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .food-card .info .category-tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            background: var(--accent-glow);
            color: var(--gradient-1);
            margin-top: 6px;
        }
        
        .food-card .order-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .food-card .order-btn:hover {
            background: var(--gradient-1);
            color: white;
        }
        
        /* ============================================
           ADMIN PANEL
           ============================================ */
        .admin-panel {
            display: none;
            padding: 20px;
            margin: 20px;
            border: 2px solid var(--gradient-1);
            border-radius: 16px;
            background: var(--bg-card);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .admin-panel.visible {
            display: block;
        }
        
        .admin-panel .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .admin-panel .admin-header h2 {
            color: var(--gradient-1);
            font-size: 22px;
        }
        
        .admin-panel .admin-header .close-admin {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .admin-panel .admin-header .close-admin:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .admin-panel .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .admin-panel .admin-form .full-width {
            grid-column: 1 / -1;
        }
        
        .admin-panel .admin-form input,
        .admin-panel .admin-form textarea,
        .admin-panel .admin-form select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .admin-panel .admin-form input:focus,
        .admin-panel .admin-form textarea:focus,
        .admin-panel .admin-form select:focus {
            border-color: var(--gradient-1);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        
        .admin-panel .admin-form textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .admin-panel .admin-form .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .admin-panel .admin-form .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        
        .admin-panel .admin-form .btn-danger {
            background: #dc3545;
        }
        
        .admin-panel .admin-form .btn-danger:hover {
            box-shadow: 0 8px 30px rgba(220,53,69,0.3);
        }
        
        .admin-list {
            margin-top: 20px;
        }
        
        .admin-list .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--bg-primary);
            transition: all 0.3s ease;
        }
        
        .admin-list .admin-item:hover {
            border-color: var(--gradient-1);
        }
        
        .admin-list .admin-item .item-info {
            flex: 1;
        }
        
        .admin-list .admin-item .item-info h4 {
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .admin-list .admin-item .item-info p {
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .admin-list .admin-item .item-actions {
            display: flex;
            gap: 8px;
        }
        
        .admin-list .admin-item .item-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .admin-list .admin-item .item-actions .edit-btn {
            background: var(--accent-glow);
            color: var(--gradient-1);
        }
        
        .admin-list .admin-item .item-actions .edit-btn:hover {
            background: var(--gradient-1);
            color: white;
        }
        
        .admin-list .admin-item .item-actions .delete-btn {
            background: rgba(220,53,69,0.15);
            color: #dc3545;
        }
        
        .admin-list .admin-item .item-actions .delete-btn:hover {
            background: #dc3545;
            color: white;
        }
        
        /* ============================================
           ORDER MODAL
           ============================================ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

<script>
// ============================================

const firebaseConfig = {
    apiKey: "AIzaSyDpFyANpjv2dMUvXoMSSmqoT3s1UwJLUkg",
    authDomain: "dvary-9a7d0.firebaseapp.com",

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const googleProvider = new firebase.auth.GoogleAuthProvider();

// ============================================
// THEME SYSTEM
// ============================================
const themes = ['orange', 'green', 'purple', 'red', 'blue'];
let themeIndex = 0;

function toggleTheme() {
    themeIndex = (themeIndex + 1) % themes.length;
    document.getElementById('htmlElement').setAttribute('data-theme', themes[themeIndex]);
    localStorage.setItem('food-theme', themes[themeIndex]);
}

// Load saved theme
const savedTheme = localStorage.getItem('food-theme') || 'orange';
document.getElementById('htmlElement').setAttribute('data-theme', savedTheme);

// ============================================
// AUTH FUNCTIONS
// ============================================
const loginForm = document.getElementById('loginFormElement');
const signupForm = document.getElementById('signupFormElement');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const signupName = document.getElementById('signupName');
const signupEmail = document.getElementById('signupEmail');
const signupPassword = document.getElementById('signupPassword');
const signupConfirm = document.getElementById('signupConfirm');
const signInBtn = document.getElementById('signInBtn');
const loading = document.getElementById('loading');
const message = document.getElementById('message');
const tabBtns = document.querySelectorAll('.tab-btn');

function showLoading() { loading.classList.add('active'); }
function hideLoading() { loading.classList.remove('active'); }

function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message active ' + type;
    setTimeout(() => message.classList.remove('active'), 5000);
}

function clearForms() {
    loginEmail.value = '';
    loginPassword.value = '';
    signupName.value = '';
    signupEmail.value = '';
    signupPassword.value = '';
    signupConfirm.value = '';
}

tabBtns.forEach(btn => {
    btn.addEventListener('click', function() {
        tabBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tab + 'Form').classList.add('active');
        message.classList.remove('active');
    });
});

signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = signupName.value.trim();
    const email = signupEmail.value.trim();
    const password = signupPassword.value;
    const confirm = signupConfirm.value;
    
    if (!name || !email || !password || !confirm) {
        showMessage('Please fill all fields', 'error');
        return;
    }
    if (password !== confirm) {
        showMessage('Passwords do not match!', 'error');
        return;
    }
    if (password.length < 6) {
        showMessage('Password must be at least 6 characters', 'error');
        return;
    }
    
    showLoading();
    try {
        const result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: name });
        hideLoading();
        showMessage('✅ Account created! Welcome!', 'success');
        clearForms();
    } catch (error) {
        hideLoading();
        let msg = 'Error: ';
        switch (error.code) {
            case 'auth/email-already-in-use': msg += 'Email already in use.'; break;
            case 'auth/invalid-email': msg += 'Invalid email address.'; break;
            case 'auth/weak-password': msg += 'Password is too weak.'; break;
            default: msg += error.message;
        }
        showMessage(msg, 'error');
    }
});

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    
    if (!email || !password) {
        showMessage('Please fill email and password', 'error');
        return;
    }
    
    showLoading();
    try {
        await auth.signInWithEmailAndPassword(email, password);
        hideLoading();
        showMessage('✅ Login successful!', 'success');
        clearForms();
    } catch (error) {
        hideLoading();
        let msg = 'Error: ';
        switch (error.code) {
            case 'auth/user-not-found': msg += 'Account not found. Please sign up.'; break;
            case 'auth/wrong-password': msg += 'Incorrect password.'; break;
            case 'auth/invalid-email': msg += 'Invalid email address.'; break;
            case 'auth/too-many-requests': msg += 'Too many attempts. Try again later.'; break;
            default: msg += error.message;
        }
        showMessage(msg, 'error');
    }
});

signInBtn.addEventListener('click', async () => {
    showLoading();
    try {
        await auth.signInWithPopup(googleProvider);
        hideLoading();
        showMessage('✅ Login with Google successful!', 'success');
    } catch (error) {
        hideLoading();
        if (error.code === 'auth/popup-blocked') {
            showMessage('⚠️ Please allow popups for this site.', 'error');
        } else if (error.code === 'auth/popup-closed-by-user') {
            showMessage('Login cancelled.', 'info');
        } else if (error.code !== 'auth/cancelled-popup-request') {
            showMessage('Error: ' + error.message, 'error');
        }
    }
});

function handleLogout() {
    auth.signOut().then(() => {
        appContent.classList.remove('visible');
        loginScreen.style.display = 'flex';
        document.getElementById('adminPanel').classList.remove('visible');
    }).catch((error) => console.error('Logout error:', error));
}

// ============================================
// FOOD DATA
// ============================================
let foods = [];
let currentCategory = 'all';
let currentUser = null;

const defaultFoods = [
    { id: 1, name: 'Margherita Pizza', price: '$12.99', category: 'pizza', emoji: '🍕', desc: 'Classic tomato, mozzarella, and basil' },
    { id: 2, name: 'Pepperoni Pizza', price: '$14.99', category: 'pizza', emoji: '🍕', desc: 'Pepperoni, mozzarella, and tomato sauce' },

    { id: 10, name: 'Fish Taco', price: '$9.99', category: 'taco', emoji: '🌮', desc: 'Crispy fish with slaw and spicy sauce' },
    { id: 11, name: 'Strawberry Smoothie', price: '$6.99', category: 'drink', emoji: '🥤', desc: 'Fresh strawberry with yogurt and honey' },
    { id: 12, name: 'Mango Smoothie', price: '$6.99', category: 'drink', emoji: '🥤', desc: 'Sweet mango with orange and banana' },
    { id: 13, name: 'Chocolate Cake', price: '$7.99', category: 'dessert', emoji: '🍰', desc: 'Rich chocolate cake with ganache' },
    { id: 14, name: 'Cheesecake', price: '$8.99', category: 'dessert', emoji: '🍰', desc: 'Creamy cheesecake with berry topping' },
    { id: 15, name: 'Hawaiian Pizza', price: '$15.99', category: 'pizza', emoji: '🍕', desc: 'Ham, pineapple, and mozzarella' },
    { id: 16, name: 'Mushroom Burger', price: '$10.99', category: 'burger', emoji: '🍔', desc: 'Beef patty with grilled mushrooms' },
];

// ============================================
// LOAD FOODS FROM FIRESTORE OR LOCAL
// ============================================
async function loadFoods() {
    try {
        const snapshot = await db.collection('foods').orderBy('createdAt', 'desc').get();
        if (!snapshot.empty) {
            foods = [];
            snapshot.forEach(doc => {
                foods.push({ id: doc.id, ...doc.data() });
            });
        } else {
            // Use default foods
            foods = [...defaultFoods];
            // Save to Firestore
            for (const food of foods) {
                await db.collection('foods').add({
                    name: food.name,
                    price: food.price,
                    category: food.category,
                    emoji: food.emoji,
                    desc: food.desc,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }
        renderFoods();
        renderAdminList();
    } catch (error) {
        console.error('Error loading foods:', error);
        foods = [...defaultFoods];
        renderFoods();
        renderAdminList();
    }
}

// ============================================
// RENDER FOODS
// ============================================
function renderFoods(category = currentCategory) {
    const grid = document.getElementById('foodGrid');
    let filtered = foods;
    
    if (category !== 'all') {
        filtered = foods.filter(f => f.category === category);
    }
    
    if (filtered.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted);">
                <i class="fas fa-utensils" style="font-size:50px; display:block; margin-bottom:15px; opacity:0.3;"></i>
                <p>No food items available</p>
                <p style="font-size:13px; margin-top:5px;">Admin will add soon!</p>
            </div>
        `;
        return;
    }
    
    grid.innerHTML = filtered.map(food => `
        <div class="food-card">
            <div class="image">
                ${food.emoji || '🍽️'}
                <div class="price-tag">${food.price || '$0.00'}</div>
            </div>
            <div class="info">
                <h3>${food.name || 'Food Item'}</h3>
                <p>${food.desc || 'Delicious food item'}</p>
                <span class="category-tag">${food.category || 'food'}</span>
            </div>
            <button class="order-btn" onclick="openOrderModal('${food.id}')">
                <i class="fas fa-shopping-cart"></i> Order Now
            </button>
        </div>
    `).join('');
}

// ============================================
// RENDER ADMIN LIST
// ============================================
function renderAdminList() {
    const list = document.getElementById('adminList');
    if (foods.length === 0) {
        list.innerHTML = `<p style="color:var(--text-muted);">No food items added yet</p>`;
        return;
    }
    
    list.innerHTML = foods.map((food, index) => `
        <div class="admin-item">
            <div class="item-info">
                <h4>${food.emoji || '🍽️'} ${food.name || 'Food'}</h4>
                <p>${food.price || '$0.00'} • ${food.category || 'food'} • ${food.desc || ''}</p>
            </div>
            <div class="item-actions">
                <button class="edit-btn" onclick="editFood('${food.id}')">✏️ Edit</button>
                <button class="delete-btn" onclick="deleteFood('${food.id}')">🗑️ Delete</button>
            </div>
        </div>
    `).join('');
}

// ============================================
// ADMIN FUNCTIONS
// ============================================
let adminPassword = '5050';
let adminVisible = false;

function toggleAdmin() {
    if (!currentUser) {
        alert('Please login first!');
        return;
    }
    
    const panel = document.getElementById('adminPanel');
    if (!adminVisible) {
        const pwd = prompt('🔐 Enter Admin Password:');
        if (pwd === adminPassword) {
            adminVisible = true;
            panel.classList.add('visible');
        } else if (pwd !== null) {
            alert('❌ Incorrect password!');
        }
    } else {
        adminVisible = false;
        panel.classList.remove('visible');
    }
}

function clearAdminForm() {
    document.getElementById('foodName').value = '';
    document.getElementById('foodPrice').value = '';
    document.getElementById('foodCategory').value = 'pizza';
    document.getElementById('foodEmoji').value = '';
    document.getElementById('foodDesc').value = '';
    document.getElementById('editId').value = '';
    document.querySelector('.admin-form .btn').textContent = '📤 Add Food';
}

async function saveFood() {
    const name = document.getElementById('foodName').value.trim();
    const price = document.getElementById('foodPrice').value.trim();
    const category = document.getElementById('foodCategory').value;
    const emoji = document.getElementById('foodEmoji').value.trim() || '🍽️';
    const desc = document.getElementById('foodDesc').value.trim();
    const editId = document.getElementById('editId').value;
    
    if (!name || !price) {
        alert('Please fill Name and Price!');
        return;
    }
    
    try {
        if (editId) {
            // Edit existing
            await db.collection('foods').doc(editId).update({
                name, price, category, emoji, desc,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('✅ Food updated!');
        } else {
            // Add new
            await db.collection('foods').add({
                name, price, category, emoji, desc,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('✅ Food added!');
        }
        clearAdminForm();
        loadFoods();
    } catch (error) {
        alert('❌ Error: ' + error.message);
    }
}

async function editFood(id) {
    const food = foods.find(f => f.id === id);
    if (!food) return;
    
    document.getElementById('foodName').value = food.name || '';
    document.getElementById('foodPrice').value = food.price || '';
    document.getElementById('foodCategory').value = food.category || 'pizza';
    document.getElementById('foodEmoji').value = food.emoji || '';
    document.getElementById('foodDesc').value = food.desc || '';
    document.getElementById('editId').value = id;
    document.querySelector('.admin-form .btn').textContent = '✏️ Update Food';
    document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
}

async function deleteFood(id) {
    if (!confirm('Are you sure you want to delete this food?')) return;
    
    try {
        await db.collection('foods').doc(id).delete();
        alert('🗑️ Food deleted!');
        loadFoods();
    } catch (error) {
        alert('❌ Error: ' + error.message);
    }
}

// ============================================
// ORDER MODAL
// ============================================
let currentOrderFood = null;

function openOrderModal(foodId) {
    const food = foods.find(f => f.id === foodId);
    if (!food) return;
    
    currentOrderFood = food;
    document.getElementById('orderIcon').textContent = food.emoji || '🍽️';
    document.getElementById('orderTitle').textContent = food.name || 'Food';
    document.getElementById('orderPrice').textContent = food.price || '$0.00';
    document.getElementById('orderModal').classList.add('visible');
    document.body.style.overflow = 'hidden';
}

function closeOrderModal() {
    document.getElementById('orderModal').classList.remove('visible');
    document.body.style.overflow = '';
}

// Order form
document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('orderName').value.trim();
    const phone = document.getElementById('orderPhone').value.trim();
    const address = document.getElementById('orderAddress').value.trim();
    
    if (!name || !phone || !address) {
        alert('Please fill all fields!');
        return;
    }
    
    alert(`✅ Order placed successfully!\n\n🍕 ${currentOrderFood.name}\n👤 ${name}\n📱 ${phone}\n📍 ${address}\n\nThank you for ordering!`);
    closeOrderModal();
    this.reset();
});

// ============================================
// CATEGORY BUTTONS
// ============================================
document.querySelectorAll('.categories button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.category;
        renderFoods(currentCategory);
    });
});

// ============================================
// AUTH STATE LISTENER
// ============================================
const loginScreen = document.getElementById('loginScreen');
const appContent = document.getElementById('appContent');

auth.onAuthStateChanged((user) => {
    currentUser = user;
    if (user) {
        loginScreen.style.display = 'none';
        appContent.classList.add('visible');
        document.getElementById('userAvatar').textContent = (user.displayName || 'U')[0].toUpperCase();
        loadFoods();
    } else {
        loginScreen.style.display = 'flex';
        appContent.classList.remove('visible');
        document.getElementById('adminPanel').classList.remove('visible');
        adminVisible = false;
    }
});

// Close modal on outside click
document.getElementById('orderModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeOrderModal();
    }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeOrderModal();
        if (document.getElementById('adminPanel').classList.contains('visible')) {
            toggleAdmin();
        }
    }
});

console.log('👑 Admin Password: 5050');
console.log('📦 ' + foods.length + ' food items loaded');
</script>
