            { en: "Niece", sw: "Mpwa", category: "drama", movie: "Niece", pronunciation: "/niːs/" },

            // ========== MANENO 200 ZAIDI (Food) ==========
            { en: "Breakfast", sw: "Kiamsha kinywa", category: "daily", movie: "Breakfast", pronunciation: "/ˈbrɛkfəst/" },
            { en: "Lunch", sw: "Chakula cha mchana", category: "daily", movie: "Lunch", pronunciation: "/lʌntʃ/" },
            { en: "Dinner", sw: "Chakula cha jioni", category: "daily", movie: "Dinner", pronunciation: "/ˈdɪnər/" },
            { en: "Snack", sw: "Vitafunio", category: "daily", movie: "Snack", pronunciation: "/snæk/" },
            { en: "Dessert", sw: "Vitamu", category: "daily", movie: "Dessert", pronunciation: "/dɪˈzɜːrt/" },
            { en: "Fruit", sw: "Matunda", category: "daily", movie: "Fruit", pronunciation: "/fruːt/" },
            { en: "Vegetable", sw: "Mboga", category: "daily", movie: "Vegetable", pronunciation: "/ˈvɛdʒtəbəl/" },
            { en: "Meat", sw: "Nyama", category: "daily", movie: "Meat", pronunciation: "/miːt/" },
            { en: "Fish", sw: "Samaki", category: "daily", movie: "Fish", pronunciation: "/fɪʃ/" },
            { en: "Chicken", sw: "Kuku", category: "daily", movie: "Chicken", pronunciation: "/ˈtʃɪkɪn/" },
            { en: "Beef", sw: "Nyama ya ng'ombe", category: "daily", movie: "Beef", pronunciation: "/biːf/" },
            { en: "Pork", sw: "Nyama ya nguruwe", category: "daily", movie: "Pork", pronunciation: "/pɔːrk/" },
            { en: "Lamb", sw: "Nyama ya kondoo", category: "daily", movie: "Lamb", pronunciation: "/læm/" },
            { en: "Rice", sw: "Wali", category: "daily", movie: "Rice", pronunciation: "/raɪs/" },
            { en: "Bread", sw: "Mkate", category: "daily", movie: "Bread", pronunciation: "/brɛd/" },
            { en: "Pasta", sw: "Pasta", category: "daily", movie: "Pasta", pronunciation: "/ˈpɑːstə/" },
            { en: "Pizza", sw: "Pizza", category: "daily", movie: "Pizza", pronunciation: "/ˈpiːtsə/" },
            { en: "Burger", sw: "Burger", category: "daily", movie: "Burger", pronunciation: "/ˈbɜːrɡər/" },
            { en: "Fries", sw: "Chips", category: "daily", movie: "Fries", pronunciation: "/fraɪz/" },
            { en: "Salad", sw: "Saladi", category: "daily", movie: "Salad", pronunciation: "/ˈsæləd/" },

            // ========== MANENO 200 ZAIDI (House) ==========
            { en: "Window", sw: "Dirisha", category: "daily", movie: "Window", pronunciation: "/ˈwɪndoʊ/" },
            { en: "Wall", sw: "Ukuta", category: "daily", movie: "Wall", pronunciation: "/wɔːl/" },
            { en: "Floor", sw: "Sakafu", category: "daily", movie: "Floor", pronunciation: "/flɔːr/" },
            { en: "Ceiling", sw: "Dari", category: "daily", movie: "Ceiling", pronunciation: "/ˈsiːlɪŋ/" },
            { en: "Roof", sw: "Paa", category: "daily", movie: "Roof", pronunciation: "/ruːf/" },
            { en: "Garden", sw: "Bustani", category: "daily", movie: "Garden", pronunciation: "/ˈɡɑːrdən/" },
            { en: "Garage", sw: "Garaji", category: "daily", movie: "Garage", pronunciation: "/ɡəˈrɑːʒ/" },
            { en: "Balcony", sw: "Balconi", category: "daily", movie: "Balcony", pronunciation: "/ˈbælkəni/" },
            { en: "Stairs", sw: "Ngazi", category: "daily", movie: "Stairs", pronunciation: "/stɛərz/" },
            { en: "Elevator", sw: "Eleveta", category: "daily", movie: "Elevator", pronunciation: "/ˈɛlɪveɪtər/" }
        ];

        // =====================================================================
        //  STATE
        // =====================================================================
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        let totalWords = WORDS.length;
        let currentFilter = 'all';
        let favorites = JSON.parse(localStorage.getItem('movieFavorites') || '[]');
        let answeredCorrect = JSON.parse(localStorage.getItem('movieAnswered') || '{}');

        // Filtered list based on filter
        function getFilteredWords() {
            if (currentFilter === 'all') return WORDS;
            if (currentFilter === 'favorites') {
                return WORDS.filter((_, i) => favorites.includes(i));
            }
            return WORDS.filter(w => w.category === currentFilter);
        }

        // =====================================================================
        //  DOM REFS
        // =====================================================================
        const wordEn = document.getElementById('wordEn');
        const wordSw = document.getElementById('wordSw');
        const pronunciation = document.getElementById('pronunciation');
        const movieBadge = document.getElementById('movieBadge');
        const exampleSentence = document.getElementById('exampleSentence');
        const wordCounter = document.getElementById('wordCounter');
        const totalWordsCount = document.getElementById('totalWordsCount');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const correctDisplay = document.getElementById('correctDisplay');
        const totalDisplay = document.getElementById('totalDisplay');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');
        const progressPercentLabel = document.getElementById('progressPercentLabel');
        const quizInput = document.getElementById('quizInput');
        const quizFeedback = document.getElementById('quizFeedback');
        const quizWordLabel = document.getElementById('quizWordLabel');

        // =====================================================================
        //  FUNCTIONS
        // =====================================================================
        function getCurrentWord() {
            const filtered = getFilteredWords();
            if (filtered.length === 0) return null;
            if (currentIndex >= filtered.length) currentIndex = 0;
            const word = filtered[currentIndex];
            const originalIndex = WORDS.indexOf(word);
            return { word, originalIndex, filtered };
        }

        function displayWord() {
            const data = getCurrentWord();
            if (!data) {
                wordEn.textContent = 'Hakuna maneno';
                wordSw.textContent = '';
                pronunciation.textContent = '';
                movieBadge.textContent = '⛔';
                exampleSentence.textContent = 'Hakuna maneno yanayolingana na chaguo lako.';
                quizWordLabel.textContent = '---';
                wordCounter.textContent = '0 / 0';
                return;
            }

            const { word, originalIndex, filtered } = data;
            const idx = filtered.indexOf(word);

            wordEn.textContent = word.en;
            wordSw.textContent = word.sw;
            pronunciation.textContent = word.pronunciation || '/ˈwɜːrd/';
            movieBadge.textContent = word.movie ? `🎬 ${word.movie}` : '🎬 Movie';
            exampleSentence.innerHTML = `"${word.example || 'Example sentence...'}" <small>— Movie: ${word.movie || 'Unknown'}</small>`;
            quizWordLabel.textContent = word.en;
            wordCounter.textContent = `${idx + 1} / ${filtered.length}`;
            totalWordsCount.textContent = `Maneno yote: ${totalWords.toLocaleString()}+`;

            // Update progress
            const total = totalWords;
            const answered = Object.keys(answeredCorrect).length;
            const pct = Math.min(100, Math.round((answered / total) * 100));
            progressFill.style.width = pct + '%';
            progressPercent.textContent = pct + '%';
            progressPercentLabel.textContent = pct + '%';

            // Stats
            scoreDisplay.textContent = score;
            correctDisplay.textContent = correctCount;
            totalDisplay.textContent = total;

            // Clear quiz
            quizFeedback.textContent = '\u00A0';
            quizFeedback.className = 'quiz-feedback';
            quizInput.value = '';
            quizInput.focus();

            // Update favorite button
            const favBtn = document.getElementById('favoriteBtn');
            if (favorites.includes(originalIndex)) {
                favBtn.textContent = '⭐';
                favBtn.style.color = '#ffd200';
            } else {
                favBtn.textContent = '☆';
                favBtn.style.color = '#8888bb';
            }
        }

        function nextWord() {
            const filtered = getFilteredWords();
            if (filtered.length === 0) return;
            currentIndex = (currentIndex + 1) % filtered.length;
            displayWord();
        }

        function prevWord() {
            const filtered = getFilteredWords();
            if (filtered.length === 0) return;
            currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
            displayWord();
        }

        function shuffleWord() {
            const filtered = getFilteredWords();
            if (filtered.length === 0) return;
            currentIndex = Math.floor(Math.random() * filtered.length);
            displayWord();
        }

        function speakText(text) {
            if (!window.speechSynthesis) {
                alert('Browser yako haitumii Text-to-Speech.');
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        function listenWord() {
            const data = getCurrentWord();
            if (data) speakText(data.word.en);
        }

        function checkQuiz() {
            const data = getCurrentWord();
            if (!data) return;

            const userAnswer = quizInput.value.trim();
            if (!userAnswer) {
                quizFeedback.textContent = '⚠️ Tafadhali andika jibu.';
                quizFeedback.className = 'quiz-feedback wrong';
                return;
            }

            const correct = data.word.sw;
            const isCorrect = userAnswer.toLowerCase().trim() === correct.toLowerCase().trim();

            if (isCorrect) {
                quizFeedback.textContent = '✅ Sahihi! +1 point';
                quizFeedback.className = 'quiz-feedback correct';
                score += 1;
                if (!answeredCorrect[data.originalIndex]) {
                    answeredCorrect[data.originalIndex] = true;
                    correctCount += 1;
                    localStorage.setItem('movieAnswered', JSON.stringify(answeredCorrect));
                }
                displayWord();
            } else {
                quizFeedback.textContent = `❌ Jibu sahihi ni: "${correct}". Jaribu tena!`;
                quizFeedback.className = 'quiz-feedback wrong';
            }
        }

        function toggleFavorite() {
            const data = getCurrentWord();
            if (!data) return;
            const idx = data.originalIndex;
            const pos = favorites.indexOf(idx);
            if (pos === -1) {
                favorites.push(idx);
            } else {
                favorites.splice(pos, 1);
            }
            localStorage.setItem('movieFavorites', JSON.stringify(favorites));
            displayWord();
        }

        function showFavorites() {
            if (currentFilter === 'favorites') {
                currentFilter = 'all';
            } else {
                currentFilter = 'favorites';
            }
            updateFilterButtons();
            currentIndex = 0;
            displayWord();
        }

        function setFilter(filter) {
            currentFilter = filter;
            updateFilterButtons();
            currentIndex = 0;
            displayWord();
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-bar button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === currentFilter) {
                    btn.classList.add('active');
                }
            });
        }

        function resetApp() {
            if (confirm('Una hakika unataka kuanza upya? Maendeleo yote yatafutwa.')) {
                score = 0;
                correctCount = 0;
                answeredCorrect = {};
                favorites = [];
                localStorage.setItem('movieAnswered', JSON.stringify(answeredCorrect));
                localStorage.setItem('movieFavorites', JSON.stringify(favorites));
                currentIndex = 0;
                displayWord();
            }
        }

        function toggleDark() {
            const body = document.body;
            const container = document.querySelector('.app-container');
            if (body.style.background.includes('0a0a1a')) {
                body.style.background = '#f0f0f5';
                body.style.color = '#1a1a2e';
                container.style.background = 'rgba(255,255,255,0.9)';
                container.style.border = '1px solid #ddd';
                document.querySelectorAll('.stats, .card, .example, .quiz-input, .filter-bar button, .actions button, .footer-actions button').forEach(el => {
                    el.style.color = '#1a1a2e';
                });
                document.querySelector('.stats').style.background = 'rgba(0,0,0,0.05)';
                document.querySelector('.card').style.background = 'rgba(255,255,255,0.9)';
                document.querySelector('.example').style.background = 'rgba(0,0,0,0.05)';
                document.querySelector('.quiz-input').style.background = '#fff';
                document.querySelector('.quiz-input').style.color = '#1a1a2e';
                document.getElementById('toggleDarkBtn').textContent = '☀️ Toggle';
            } else {
                body.style.background = 'linear-gradient(145deg, #0a0a1a, #1a1a3e, #0d0d2b)';
                body.style.color = '#f0f0f5';
                container.style.background = 'rgba(255,255,255,0.05)';
                container.style.border = '1px solid rgba(255,255,255,0.06)';
                document.querySelectorAll('.stats, .card, .example, .quiz-input, .filter-bar button, .actions button, .footer-actions button').forEach(el => {
                    el.style.color = '';
                });
                document.querySelector('.stats').style.background = 'rgba(0,0,0,0.35)';
                document.querySelector('.card').style.background = 'rgba(255,255,255,0.04)';
                document.querySelector('.example').style.background = 'rgba(0,0,0,0.3)';
                document.querySelector('.quiz-input').style.background = 'rgba(0,0,0,0.4)';
                document.querySelector('.quiz-input').style.color = '#fff';
                document.getElementById('toggleDarkBtn').textContent = '🌙 Toggle';
            }
        }

        // =====================================================================
        //  EVENT LISTENERS
        // =====================================================================
        document.getElementById('nextBtn').addEventListener('click', nextWord);
        document.getElementById('prevBtn').addEventListener('click', prevWord);
        document.getElementById('shuffleBtn').addEventListener('click', shuffleWord);
        document.getElementById('listenBtn').addEventListener('click', listenWord);
        document.getElementById('checkQuizBtn').addEventListener('click', checkQuiz);
        document.getElementById('favoriteBtn').addEventListener('click', toggleFavorite);
        document.getElementById('showFavoritesBtn').addEventListener('click', showFavorites);
        document.getElementById('resetBtn').addEventListener('click', resetApp);
        document.getElementById('toggleDarkBtn').addEventListener('click', toggleDark);

        document.querySelectorAll('.filter-bar button').forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { e.preventDefault();
                nextWord(); }
            if (e.key === 'ArrowLeft') { e.preventDefault();
                prevWord(); }
            if (e.key === 'Enter' && document.activeElement === quizInput) {
                e.preventDefault();
                checkQuiz();
            }
            if (e.key === 's' || e.key === 'S') { e.preventDefault();
                listenWord(); }
            if (e.key === 'f' || e.key === 'F') { e.preventDefault();
                toggleFavorite(); }
        });

        // =====================================================================
        //  INIT
        // =====================================================================
        displayWord();
        console.log('✅ Movie English App imeanza! Maneno ' + totalWords + '+');
        console.log('💡 Shortcuts: [←][→] maneno, [S] sauti, [F] favorite, [Enter] jibu');
    </script>
